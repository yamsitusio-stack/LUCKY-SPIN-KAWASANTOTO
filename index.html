<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUCKY SPIN KAWASANTOTO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1 class="header">Selamat datang di LUCKY SPIN KAWASANTOTO</h1>

  <div class="id-section">
    <label for="userId">Masukkan ID Anda:</label>
    <input type="text" id="userId" placeholder="Masukkan ID">
  </div>

  <div class="wheel-section">
    <canvas id="wheel" width="500" height="500"></canvas>
    <div id="pointer"></div>
  </div>

  <button id="spinBtn" disabled>Putar Lucky Spin Sekarang</button>

  <div id="result"></div>

  <div class="fake-winners">
    <h3>Pemenang Terbaru</h3>
    <ul id="winnerList"></ul>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
